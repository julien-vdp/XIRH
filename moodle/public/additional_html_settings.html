<!-- =======================================================================
  1. WITHIN HEAD (additionalhtmlhead)
======================================================================= -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
  /* --- Global Scrollbar Styling (Airy & Premium) --- */
  ::-webkit-scrollbar {
    width: 8px;
    height: 8px;
  }
  ::-webkit-scrollbar-track {
    background: #F4F7FA;
  }
  ::-webkit-scrollbar-thumb {
    background: #CBD5E0;
    border-radius: 4px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: #A0AEC0;
  }

  /* --- Soft Background animation on all Moodle pages --- */
  body {
    padding-top: 60px !important; /* Keep standard body padding for navbar */
    background: linear-gradient(135deg, #f5f7fa 0%, #eef2f7 50%, #f5f7fa 100%) !important;
    background-size: 400% 400% !important;
    animation: xirhGradientBG 30s ease infinite !important;
    font-family: 'Outfit', sans-serif !important;
  }

  /* Reset fixed navbar to top 0 */
  .fixed-top {
    top: 0 !important;
  }

  /* Shift Moodle page content down below the 160px banner */
  #page, #page.drawers {
    margin-top: 160px !important;
  }

  /* Push left/right drawers down so they don't cover the banner/navbar */
  .drawer {
    top: 220px !important; /* 60px (navbar) + 160px (banner) */
    height: calc(100vh - 220px) !important;
  }

  /* --- Responsive Adjustments for Mobile & Tablets --- */
  @media (max-width: 767.98px) {
    .xirh-top-banner {
      display: none !important; /* Hide banner on mobile to save vertical space */
    }
    #page, #page.drawers {
      margin-top: 0 !important; /* Reset content shift */
    }
    .drawer {
      top: 60px !important; /* Reset drawer position to below navbar */
      height: calc(100vh - 60px) !important;
    }
  }

  @keyframes xirhGradientBG {
    0% { background-position: 0% 50% !important; }
    50% { background-position: 100% 50% !important; }
    100% { background-position: 0% 50% !important; }
  }

  /* Faint glowing dots representing gold orange and sky blue */
  body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: -1;
    background: radial-gradient(circle at 12% 18%, rgba(53, 180, 231, 0.03) 0%, transparent 35%),
                radial-gradient(circle at 88% 72%, rgba(245, 158, 11, 0.012) 0%, transparent 22%), /* Rare golden/orange glow */
                radial-gradient(circle at 45% 42%, rgba(48, 59, 77, 0.012) 0%, transparent 30%);
    animation: xirhFaintGlow 40s ease-in-out infinite alternate;
  }

  @keyframes xirhFaintGlow {
    0% { transform: translate(0, 0) scale(1); opacity: 0.6; }
    50% { transform: translate(2%, -1%) scale(1.03); opacity: 0.8; }
    100% { transform: translate(-1%, 2%) scale(0.98); opacity: 0.5; }
  }

  /* --- Global Header Visual Strip (Sliding Carousel below Navbar) --- */
  .xirh-top-banner {
    position: absolute;
    top: 60px; /* Sits exactly below standard Moodle navbar (60px) */
    left: 0;
    width: 100%;
    height: 160px; /* Wider visual strip */
    overflow: hidden;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
    background: transparent; /* Transparent to let gradient show through */
    z-index: 1000; /* Sits below navbar (1030) so it scrolls under it */
  }
  
  .xirh-top-carousel {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    overflow: hidden;
  }
  
  .xirh-carousel-item-global {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    opacity: 0;
    transition: opacity 1.5s ease-in-out !important;
    z-index: 1;
  }
  
  .xirh-carousel-item-global.active {
    opacity: 0.78; /* Soft transparency to let the page background show through */
    z-index: 2;
  }
  
  /* Semi-transparent overlay mask to make images soft */
  .xirh-top-banner::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(244, 247, 250, 0.15); /* Soft light overlay */
    z-index: 3;
    pointer-events: none;
  }

  /* --- Floating Companion Widget Styling --- */
  #xirh-companion-container {
    position: fixed;
    bottom: 25px;
    right: 25px;
    z-index: 9999;
    font-family: 'Outfit', sans-serif;
  }

  #xirh-companion-button {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background-color: #FFFFFF;
    border: 2px solid #35B4E7;
    box-shadow: 0 8px 24px rgba(48, 59, 77, 0.15);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    overflow: hidden;
  }

  #xirh-companion-button:hover {
    transform: scale(1.08) translateY(-2px);
    box-shadow: 0 12px 30px rgba(53, 180, 231, 0.25);
    border-color: #303B4D;
  }

  #xirh-companion-button img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  #xirh-companion-badge {
    position: absolute;
    top: -2px;
    right: -2px;
    width: 16px;
    height: 16px;
    background-color: #F59E0B; /* Golden Orange badge */
    border: 2px solid #FFFFFF;
    border-radius: 50%;
    animation: xirhPulse 2s infinite;
  }

  @keyframes xirhPulse {
    0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.7); }
    70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(245, 158, 11, 0); }
    100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
  }

  #xirh-companion-panel {
    position: absolute;
    bottom: 75px;
    right: 0;
    width: 320px;
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid rgba(226, 232, 240, 0.8);
    border-radius: 1.25rem;
    box-shadow: 0 15px 35px rgba(48, 59, 77, 0.15);
    opacity: 0;
    transform: translateY(20px) scale(0.95);
    pointer-events: none;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    overflow: hidden;
  }

  @media (max-width: 480px) {
    #xirh-companion-panel {
      width: calc(100vw - 50px) !important;
      max-width: 320px !important;
    }
  }

  #xirh-companion-panel.active {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
  }

  .xirh-panel-header {
    background-color: #303B4D;
    color: #FFFFFF;
    padding: 1.25rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    border-bottom: 2px solid #35B4E7;
  }

  .xirh-panel-header img {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1.5px solid #FFFFFF;
    background-color: #FFFFFF;
  }

  .xirh-panel-header h4 {
    margin: 0;
    font-size: 1.05rem;
    font-weight: 600;
  }

  .xirh-panel-header span {
    font-size: 0.75rem;
    color: #35B4E7;
  }

  .help-link, .fixed-bottom.text-right, .fixed-bottom.margin-right-2 {
    display: none !important;
  }

  /* Chat history container */
  .xirh-chat-history {
    height: 220px;
    overflow-y: auto;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    background: rgba(248, 250, 252, 0.6);
  }

  /* Individual message bubbles */
  .xirh-msg {
    max-width: 85%;
    padding: 0.65rem 0.85rem;
    border-radius: 1rem;
    font-size: 0.82rem;
    line-height: 1.45;
  }

  .xirh-msg-bot {
    background-color: #FFFFFF;
    border: 1px solid rgba(226, 232, 240, 0.8);
    color: #303B4D;
    align-self: flex-start;
    border-bottom-left-radius: 0.25rem;
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.02);
  }

  .xirh-msg-user {
    background-color: #35B4E7;
    color: #FFFFFF;
    align-self: flex-end;
    border-bottom-right-radius: 0.25rem;
  }

  /* Quick Suggestions */
  .xirh-chat-suggestions {
    display: flex;
    gap: 0.4rem;
    padding: 0.5rem 1rem;
    background: #FFFFFF;
    border-top: 1px solid rgba(226, 232, 240, 0.6);
    flex-wrap: wrap;
  }

  .xirh-sugg-btn {
    background: rgba(53, 180, 231, 0.08);
    border: 1px solid rgba(53, 180, 231, 0.15);
    color: #35B4E7;
    padding: 0.25rem 0.6rem;
    border-radius: 2rem;
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    text-decoration: none !important;
  }

  .xirh-sugg-btn:hover {
    background: #35B4E7;
    color: #FFFFFF;
  }

  /* Input bar styling */
  .xirh-chat-input-bar {
    display: flex;
    border-top: 1px solid rgba(226, 232, 240, 0.8);
    background: #FFFFFF;
  }

  .xirh-chat-input-bar input {
    flex: 1;
    border: none;
    padding: 0.75rem 1rem;
    font-size: 0.85rem;
    outline: none;
    color: #303B4D;
    font-family: 'Outfit', sans-serif;
  }

  .xirh-chat-input-bar button {
    background: none;
    border: none;
    color: #35B4E7;
    padding: 0 1rem;
    cursor: pointer;
    transition: color 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .xirh-chat-input-bar button:hover {
    color: #1FA0D3;
  }

  /* Typing animation */
  .xirh-typing-indicator {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 0.4rem 0.6rem;
  }

  .xirh-typing-dot {
    width: 5px;
    height: 5px;
    background: #A0AEC0;
    border-radius: 50%;
    animation: xirhTyping 1.4s infinite ease-in-out both;
  }

  .xirh-typing-dot:nth-child(1) { animation-delay: -0.32s; }
  .xirh-typing-dot:nth-child(2) { animation-delay: -0.16s; }

  @keyframes xirhTyping {
    0%, 80%, 100% { transform: scale(0); }
    40% { transform: scale(1); }
  }
</style>

    <div class="xirh-carousel-item-global" style="background-image: url('/learning/pix/xirh/xirh_carousel_analytics.png'); opacity: 0; z-index: 1;"></div>

 ======================================================================= -->
<div id="xirh-companion-container">
  
  <!-- Companion Chat Panel -->
  <div id="xirh-companion-panel">
    <div class="xirh-panel-header">
      <img src="/learning/pix/xirh/c_avatar.png" alt="Mascot">
      <div>
        <h4>XIRH Compagnon</h4>
        <span>Tuteur d'apprentissage • En ligne</span>
      </div>
    </div>
    
    <!-- Chat window history -->
    <div class="xirh-chat-history" id="xirh-chat-history">
      <div class="xirh-msg xirh-msg-bot">
        Bonjour ! Je suis XIRH, votre tuteur d'apprentissage. Prêt à optimiser vos processus RH et à chasser les fichiers Excel inutiles ? Woof !
      </div>
    </div>

    <!-- Quick Suggestions -->
    <div class="xirh-chat-suggestions">
      <button class="xirh-sugg-btn" data-query="conseil">💡 Conseil</button>
      <a href="/learning/#courses" class="xirh-sugg-btn" id="xirh-link-courses">🚀 Formations</a>
      <a href="mailto:contact@xirh.fr" class="xirh-sugg-btn">📬 Contact</a>
    </div>
    
    <!-- Chat input bar -->
    <div class="xirh-chat-input-bar">
      <input type="text" id="xirh-chat-input" placeholder="Posez une question (SIRH, BPMN, IA...)" autocomplete="off">
      <button id="xirh-chat-send" aria-label="Envoyer">
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>

  <!-- Floating Trigger Button -->
  <div id="xirh-companion-button">
    <div id="xirh-companion-badge"></div>
    <img src="/learning/pix/xirh/c_avatar.png" alt="Companion Mascot Icon">
  </div>

</div>

<script>
  (function() {
    // --- Global Top Banner Carousel ---
    function moveGlobalCarousel() {
      const carousel = document.getElementById('xirhTopCarousel');
      if (!carousel) return;
      const items = carousel.getElementsByClassName('xirh-carousel-item-global');
      if (items.length === 0) return;
      
      let activeIndex = -1;
      for (let i = 0; i < items.length; i++) {
        if (items[i].classList.contains('active')) {
          activeIndex = i;
          break;
        }
      }
      if (activeIndex === -1) activeIndex = 0;
      
      const currentItem = items[activeIndex];
      currentItem.classList.remove('active');
      currentItem.style.opacity = '0';
      currentItem.style.zIndex = '1';
      
      let nextIndex = activeIndex + 1;
      if (nextIndex >= items.length) nextIndex = 0;
      
      const nextItem = items[nextIndex];
      nextItem.classList.add('active');
      nextItem.style.opacity = '0.78';
      nextItem.style.zIndex = '2';
    }

    if (window.xirhGlobalInterval) clearInterval(window.xirhGlobalInterval);
    window.xirhGlobalInterval = setInterval(moveGlobalCarousel, 4000);

    // --- Floating Mascot Widget ---
    const trigger = document.getElementById('xirh-companion-button');
    const panel = document.getElementById('xirh-companion-panel');
    const badge = document.getElementById('xirh-companion-badge');
    const history = document.getElementById('xirh-chat-history');
    const input = document.getElementById('xirh-chat-input');
    const sendBtn = document.getElementById('xirh-chat-send');

    // List of advices
    const advices = [
      "« Un processus chaotique numérisé reste un processus chaotique, mais il s'exécute juste plus vite. Modélisez d'abord ! »",
      "« Les losanges dans vos diagrammes sont des passerelles de décision. Si vous avez 5 validations pour 1 jour de congé, simplifiez ! »",
      "« L'intelligence artificielle est excellente pour trier les données, mais le flair humain reste irremplaçable pour recruter. »",
      "« Remplacer un tableau Excel par un outil à 50k€ sans former vos équipes, c'est la garantie de perdre du temps en couleur. »",
      "« Les couloirs (swimlanes) montrent QUI fait quoi. Si une flèche fait des allers-retours constants, vous avez un goulot d'étranglement ! »",
      "« Un bon SIRH doit libérer du temps pour l'humain, pas rajouter des formulaires de validation à n'en plus finir. »",
      "« Le changement fait peur. Présentez toujours votre diagramme cible (To-Be) aux équipes pour les rassurer avant le déploiement ! »",
      "« Modéliser permet de calculer le ROI : comparez le temps passé avant et après l'automatisation. Les chiffres ne mentent pas ! »"
    ];

    // Response dictionary
    const responses = {
      "bpmn": "Woof ! Le BPMN, c'est la vie : des rectangles pour les tâches, des losanges pour les choix, et pas de gribouillis ! Pensez à bien définir vos couloirs (swimlanes) pour montrer qui fait quoi.",
      "sirh": "Le SIRH (Système d'Information RH) automatise la gestion des collaborateurs. Mais attention : sans formation ni conduite du changement, c'est comme donner une Formule 1 à un conducteur sans permis !",
      "ia": "L'IA est là pour aider, pas pour vous remplacer ! Elle est super pour analyser les profils ou rédiger des brouillons, mais elle ne saura jamais ressentir l'esprit d'équipe. Gardons du flair humain !",
      "excel": "Grrr... Excel est un outil fantastique, mais l'utiliser comme base de données RH pour 200 personnes, c'est courir vers l'enfer des doublons et des versions obsolètes. Passez au vrai SIRH !",
      "julien": "Julien est le grand maître de XIRH Consulting. Il est expert SuccessFactors/Talentsoft, pédagogue hors pair et n'aime pas le gaspillage de temps RH. Écrivez-lui à contact@xirh.fr !",
      "cours": "Nos formations vous apprennent à maîtriser la digitalisation RH, l'analyse de données et l'impact de l'IA. Allez voir notre catalogue de formations en cliquant sur 'Formations' !",
      "formation": "Nos formations vous apprennent à maîtriser la digitalisation RH, l'analyse de données et l'impact de l'IA. Allez voir notre catalogue de formations en cliquant sur 'Formations' !",
      "examen": "Pour l'examen, pas de panique ! Relisez bien vos notes sur la modélisation des processus et la structure des données RH. Et surtout, dormez bien la veille, c'est bon pour le cerveau (et le flair) !",
      "note": "Pour avoir une bonne note, montrez que vous comprenez la différence entre numériser un document et repenser un processus complet. C'est ça, la vraie transformation numérique !"
    };

    function appendMessage(text, isUser = false) {
      const msg = document.createElement('div');
      msg.className = 'xirh-msg ' + (isUser ? 'xirh-msg-user' : 'xirh-msg-bot');
      msg.innerText = text;
      history.appendChild(msg);
      history.scrollTop = history.scrollHeight;
    }

    function showTypingIndicator() {
      const indicator = document.createElement('div');
      indicator.className = 'xirh-msg xirh-msg-bot xirh-typing-indicator';
      indicator.id = 'xirh-typing';
      indicator.innerHTML = '<span class="xirh-typing-dot"></span><span class="xirh-typing-dot"></span><span class="xirh-typing-dot"></span>';
      history.appendChild(indicator);
      history.scrollTop = history.scrollHeight;
    }

    function removeTypingIndicator() {
      const indicator = document.getElementById('xirh-typing');
      if (indicator) indicator.remove();
    }

    function handleBotReply(userText) {
      showTypingIndicator();
      
      const cleanText = userText.toLowerCase().trim();
      let reply = "Woof ! C'est une excellente question sur les Ressources Humaines ou le SIRH. N'hésitez pas à en discuter avec Julien (contact@xirh.fr) pour avoir son avis d'expert !";
      
      // Match keywords
      for (const key in responses) {
        if (cleanText.includes(key)) {
          reply = responses[key];
          break;
        }
      }

      // If asking for advice
      if (cleanText === 'conseil' || cleanText.includes('conseil') || cleanText.includes('conseils')) {
        const randomIndex = Math.floor(Math.random() * advices.length);
        reply = advices[randomIndex];
      }

      setTimeout(function() {
        removeTypingIndicator();
        appendMessage(reply);
      }, 800 + Math.random() * 600);
    }

    function sendMessage() {
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      appendMessage(text, true);
      handleBotReply(text);
    }

    // Toggle Panel
    trigger.addEventListener('click', function(e) {
      e.stopPropagation();
      const isActive = panel.classList.toggle('active');
      localStorage.setItem('xirh_companion_opened', 'true');
      if(badge) badge.style.display = 'none';
      if (isActive) {
        setTimeout(() => input.focus(), 300);
      }
    });

    // Close panel on click outside
    document.addEventListener('click', function(e) {
      if (!panel.contains(e.target) && e.target !== trigger && !trigger.contains(e.target)) {
        panel.classList.remove('active');
      }
    });

    // Send button click
    sendBtn.addEventListener('click', sendMessage);

    // Enter key press
    input.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        sendMessage();
      }
    });

    // Suggestion button click
    document.addEventListener('click', function(e) {
      if (e.target.classList.contains('xirh-sugg-btn') && e.target.hasAttribute('data-query')) {
        e.preventDefault();
        e.stopPropagation();
        const query = e.target.getAttribute('data-query');
        appendMessage(query === 'conseil' ? '💡 Besoin d\'un conseil' : query, true);
        handleBotReply(query);
      }
    });

    // Auto open popup on first visit after 3.5s
    setTimeout(function() {
      if (!panel.classList.contains('active') && !localStorage.getItem('xirh_companion_opened')) {
        panel.classList.add('active');
        if(badge) badge.style.display = 'none';
      }
    }, 3500);

    // Close on courses link click
    const coursesLink = document.getElementById('xirh-link-courses');
    if (coursesLink) {
      coursesLink.addEventListener('click', function() {
        panel.classList.remove('active');
      });
    }

  })();
</script>
