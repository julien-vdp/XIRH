<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planning & Disponibilités — Julien Favaux Consultant SIRH</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <meta name="description" content="Consultez les disponibilités de Julien Favaux, Consultant Indépendant SIRH. Prenez rendez-vous directement pour vos projets de Conseil et d'Automatisation RH." />
    <meta name="keywords" content="SIRH, Consultant Indépendant, Planning, Disponibilités, Ressources Humaines" />
    
    <!-- 1. Chargement de Tailwind CSS pour le style -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. Chargement de React et ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- 3. Babel pour comprendre le code React directement dans le navigateur -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Configuration Tailwind pour les couleurs personnalisées si besoin -->
    <script>
        const savedTheme = localStorage.getItem('theme') || 'dark';
        if (savedTheme === 'dark') document.documentElement.classList.add('dark');

        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        /* Mesh background classes from XIRH Suite */
        .mesh-bg {
            position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none;
            background: #f8fafc; transition: all 0.4s ease;
        }
        .dark .mesh-bg { background: #030a1a; }
        
        .mesh-orb { position: absolute; border-radius: 50%; filter: blur(100px); will-change: transform; transition: all 0.4s ease; }
        .dark .mesh-orb-1 { background: radial-gradient(circle, rgba(37,99,235,0.25) 0%, transparent 70%); }
        .dark .mesh-orb-2 { background: radial-gradient(circle, rgba(6,182,212,0.2) 0%, transparent 70%); }
        .dark .mesh-orb-3 { background: radial-gradient(circle, rgba(59,130,246,0.14) 0%, transparent 70%); }
        
        .mesh-orb-1 { width: 800px; height: 800px; top: -20%; left: -10%; background: radial-gradient(circle, rgba(37,99,235,0.12) 0%, transparent 70%); animation: orb-float-1 20s ease-in-out infinite; }
        .mesh-orb-2 { width: 600px; height: 600px; top: 25%; right: -8%; background: radial-gradient(circle, rgba(6,182,212,0.1) 0%, transparent 70%); animation: orb-float-2 25s ease-in-out infinite; }
        .mesh-orb-3 { width: 700px; height: 700px; bottom: -10%; left: 25%; background: radial-gradient(circle, rgba(59,130,246,0.08) 0%, transparent 70%); animation: orb-float-3 22s ease-in-out infinite; }
        
        @keyframes orb-float-1 { 0%, 100% { transform: translate(0, 0) scale(1); } 33% { transform: translate(60px, 40px) scale(1.1); } 66% { transform: translate(-30px, 70px) scale(0.95); } }
        @keyframes orb-float-2 { 0%, 100% { transform: translate(0, 0) scale(1); } 33% { transform: translate(-50px, 60px) scale(1.05); } 66% { transform: translate(40px, -30px) scale(0.9); } }
        @keyframes orb-float-3 { 0%, 100% { transform: translate(0, 0) scale(1); } 33% { transform: translate(50px, -50px) scale(1.08); } 66% { transform: translate(-60px, 20px) scale(0.95); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICONES SVG (Intégrées pour éviter les dépendances) ---
        const Icon = ({ path, className, size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {path}
            </svg>
        );

        const Icons = {
            ChevronLeft: (props) => <Icon {...props} path={<><path d="m15 18-6-6 6-6"/></>} />,
            ChevronRight: (props) => <Icon {...props} path={<><path d="m9 18 6-6-6-6"/></>} />,
            Calendar: (props) => <Icon {...props} path={<><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></>} />,
            Mail: (props) => <Icon {...props} path={<><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></>} />,
            Briefcase: (props) => <Icon {...props} path={<><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></>} />,
            Info: (props) => <Icon {...props} path={<><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></>} />,
            CheckCircle: (props) => <Icon {...props} path={<><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="M22 4 12 14.01l-3-3"/></>} />,
            XCircle: (props) => <Icon {...props} path={<><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></>} />,
            Sun: (props) => <Icon {...props} path={<><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></>} />,
            Clock: (props) => <Icon {...props} path={<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>} />,
        };

        // --- API CONFIG ---
        const CALENDAR_ID = 'julien.favaux@gmail.com';
        const API_KEY = 'AIzaSyA8j4pAeyADQOiVNcCIvcOrPxbCdYHNdWY';

        // --- UTILITAIRES ---
        const parseGoogleTime = (dateTimeStr) => {
            if (!dateTimeStr) return null;
            const d = new Date(dateTimeStr);
            return d.getHours() + (d.getMinutes() / 60);
        };

        // --- COMPOSANT MODAL ---
        const Modal = ({ isOpen, onClose, title, children }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4 animate-[fadeIn_0.2s_ease-out]">
                    <div className="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl max-w-md w-full overflow-hidden animate-[zoomIn_0.2s_ease-out] border border-slate-100 dark:border-slate-700">
                        <div className="p-4 border-b border-gray-100 dark:border-slate-700 flex justify-between items-center bg-slate-50/50 dark:bg-slate-800/50">
                            <h3 className="font-semibold text-lg text-slate-800 dark:text-slate-100 capitalize">{title}</h3>
                            <button onClick={onClose} className="p-1 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-full transition-colors">
                                <Icons.XCircle className="w-6 h-6 text-slate-400 hover:text-slate-600" />
                            </button>
                        </div>
                        <div className="p-6">
                            {children}
                        </div>
                    </div>
                </div>
            );
        };

        // --- COMPOSANT APPLICATION ---
        function App() {
            const [currentDate, setCurrentDate] = useState(new Date());
            const [selectedDay, setSelectedDay] = useState(null);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [events, setEvents] = useState([]);
            const [loading, setLoading] = useState(true);
            const [theme, setTheme] = useState(localStorage.getItem('theme') || 'dark');

            const toggleTheme = () => {
                const newTheme = theme === 'dark' ? 'light' : 'dark';
                setTheme(newTheme);
                localStorage.setItem('theme', newTheme);
                if (newTheme === 'dark') document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            };

            useEffect(() => {
                if (theme === 'dark') document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, []);

            useEffect(() => {
                const fetchEvents = async () => {
                    try {
                        const timeMin = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString();
                        const timeMax = new Date(new Date().getFullYear(), new Date().getMonth() + 4, 0).toISOString();
                        const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events?key=${API_KEY}&timeMin=${timeMin}&timeMax=${timeMax}&singleEvents=true&orderBy=startTime`;
                        
                        const response = await fetch(url);
                        const data = await response.json();
                        
                        if (data.items) {
                            const processEvents = data.items.map((item, index) => {
                                const startStr = item.start.dateTime || item.start.date;
                                const endStr = item.end.dateTime || item.end.date;
                                const dateObj = new Date(startStr);
                                
                                return {
                                    id: item.id || index,
                                    dateObj: dateObj,
                                    dateStr: startStr,
                                    isFullDay: !item.start.dateTime,
                                    startValue: item.start.dateTime ? parseGoogleTime(item.start.dateTime) : 0,
                                    endValue: item.end.dateTime ? parseGoogleTime(item.end.dateTime) : 24,
                                };
                            });
                            setEvents(processEvents);
                        }
                    } catch (error) {
                        console.error('Erreur lors du chargement API Agenda :', error);
                    } finally {
                        setLoading(false);
                    }
                };
                
                fetchEvents();
            }, []);
            
            // --- LOGIQUE METIER ---
            const prevMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1));
            const nextMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1));
            const currentMonthName = currentDate.toLocaleString('fr-FR', { month: 'long', year: 'numeric' });

            const daysInMonth = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0).getDate();
            const firstDayOfMonth = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1).getDay();
            const startOffset = firstDayOfMonth === 0 ? 6 : firstDayOfMonth - 1;

            const days = [];
            for (let i = 0; i < startOffset; i++) { days.push(null); }
            for (let i = 1; i <= daysInMonth; i++) { days.push(new Date(currentDate.getFullYear(), currentDate.getMonth(), i)); }

            const getEventsForDay = (dateObj) => {
                if (!dateObj) return [];
                return events.filter(evt => 
                    evt.dateObj.getDate() === dateObj.getDate() &&
                    evt.dateObj.getMonth() === dateObj.getMonth() &&
                    evt.dateObj.getFullYear() === dateObj.getFullYear()
                );
            };

            const getDayStatus = (dayEvents) => {
                if (!dayEvents || dayEvents.length === 0) return { type: 'free', label: 'Disponible' };
                
                let busyAM = false;
                let busyPM = false;
                let isFull = false;

                dayEvents.forEach(evt => {
                    if (evt.isFullDay) isFull = true;
                    else {
                        if (evt.startValue <= 12.5) busyAM = true;
                        if (evt.endValue >= 13.5) busyPM = true;
                    }
                });

                if (isFull || (busyAM && busyPM)) return { type: 'full', label: 'Indisponible' };
                if (busyAM) return { type: 'am', label: 'Matin pris' };
                if (busyPM) return { type: 'pm', label: 'Aprem. pris' };
                return { type: 'free', label: 'Disponible' };
            };

            const handleDayClick = (dateObj, dayEvents, status) => {
                if (!dateObj) return;
                setSelectedDay({ date: dateObj, events: dayEvents, status: status });
                setIsModalOpen(true);
            };

            return (
                <div className="min-h-screen bg-transparent text-slate-800 dark:text-slate-200 font-sans pb-10 relative">
                    
                    {/* Mesh Gradient Animé */}
                    <div className="mesh-bg">
                        <div className="mesh-orb mesh-orb-1"></div>
                        <div className="mesh-orb mesh-orb-2"></div>
                        <div className="mesh-orb mesh-orb-3"></div>
                    </div>

                    {/* Header */}
                    <header className="bg-white/80 dark:bg-slate-900/60 backdrop-blur-md shadow-sm sticky top-0 z-20 border-b border-slate-200/50 dark:border-slate-700/50 transition-colors">
                        <div className="max-w-5xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-3">
                                <div className="h-10 w-10 bg-teal-600 rounded-lg flex items-center justify-center text-white font-bold text-xl shadow-md">
                                    J
                                </div>
                                <div>
                                    <h1 className="text-lg font-bold text-slate-900 dark:text-white">Julien - Consultant SIRH</h1>
                                    <p className="text-xs text-slate-500 dark:text-slate-400 font-medium uppercase tracking-wide">Disponibilités Missions</p>
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-4">
                                <button onClick={toggleTheme} className="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 text-slate-800 dark:text-white transition-colors">
                                    {theme === 'dark' ? <Icons.Sun size={20} /> : <Icons.Clock size={20} />}
                                </button>
                                <a href="mailto:julien@exemple.com?subject=Demande de disponibilité" className="flex items-center gap-2 px-5 py-2.5 text-sm font-semibold text-white bg-slate-900 dark:bg-teal-600 hover:bg-slate-800 dark:hover:bg-teal-500 rounded-full transition-all shadow-md active:scale-95">
                                    <Icons.Mail size={16} />
                                    Me Contacter
                                </a>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto px-4 py-8">
                        
                        {/* Légende */}
                        <div className="flex flex-wrap justify-center gap-4 sm:gap-6 mb-8 text-sm font-medium bg-white dark:bg-slate-800 py-3 px-6 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 w-fit mx-auto">
                            <div className="flex items-center gap-2">
                                <div className="flex h-4 w-4 rounded-full overflow-hidden border border-slate-200 dark:border-slate-600">
                                    <div className="w-full h-full bg-emerald-400"></div>
                                </div>
                                <span className="text-slate-600 dark:text-slate-400">Libre</span>
                            </div>
                            <div className="flex items-center gap-2">
                                <div className="flex h-4 w-4 rounded-full overflow-hidden border border-slate-200 dark:border-slate-600">
                                    <div className="w-1/2 h-full bg-amber-400"></div>
                                    <div className="w-1/2 h-full bg-emerald-400"></div>
                                </div>
                                <span className="text-slate-600 dark:text-slate-400">Matin pris</span>
                            </div>
                            <div className="flex items-center gap-2">
                                <div className="flex h-4 w-4 rounded-full overflow-hidden border border-slate-200 dark:border-slate-600">
                                    <div className="w-1/2 h-full bg-emerald-400"></div>
                                    <div className="w-1/2 h-full bg-amber-400"></div>
                                </div>
                                <span className="text-slate-600 dark:text-slate-400">Aprem. pris</span>
                            </div>
                            <div className="flex items-center gap-2">
                                <div className="flex h-4 w-4 rounded-full overflow-hidden border border-slate-200 dark:border-slate-600">
                                    <div className="w-full h-full bg-amber-400"></div>
                                </div>
                                <span className="text-slate-600 dark:text-slate-400">Occupé</span>
                            </div>
                        </div>

                        {/* Navigation */}
                        <div className="flex items-center justify-between mb-6 bg-white dark:bg-slate-800 p-1.5 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 max-w-md mx-auto">
                            <button onClick={prevMonth} className="p-3 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-xl transition-colors text-slate-600 dark:text-slate-300">
                                <Icons.ChevronLeft size={20} />
                            </button>
                            <h2 className="text-lg font-bold capitalize text-slate-800 dark:text-slate-100 px-4">{currentMonthName}</h2>
                            <button onClick={nextMonth} className="p-3 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-xl transition-colors text-slate-600 dark:text-slate-300">
                                <Icons.ChevronRight size={20} />
                            </button>
                        </div>

                        {/* Grille */}
                        <div className="bg-white/80 dark:bg-slate-800/60 backdrop-blur-md rounded-3xl shadow-xl border border-slate-200/50 dark:border-slate-700/50 overflow-hidden relative z-10 transition-colors">
                            <div className="grid grid-cols-7 border-b border-slate-200 dark:border-slate-700/50 bg-slate-50/80 dark:bg-slate-800/40">
                                {['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam', 'Dim'].map(day => (
                                    <div key={day} className="py-3 text-center text-[11px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest">
                                        {day}
                                    </div>
                                ))}
                            </div>

                            <div className="grid grid-cols-7 bg-slate-100 dark:bg-slate-900 gap-px border-collapse">
                                {days.map((dateObj, idx) => {
                                    const dayEvents = getEventsForDay(dateObj);
                                    const isToday = dateObj && new Date().toDateString() === dateObj.toDateString();
                                    const isWeekend = dateObj && (dateObj.getDay() === 0 || dateObj.getDay() === 6);
                                    const status = dateObj ? getDayStatus(dayEvents) : { type: 'none' };

                                    return (
                                        <div 
                                            key={idx} 
                                            onClick={() => handleDayClick(dateObj, dayEvents, status)}
                                            className={`
                                                min-h-[100px] md:min-h-[120px] p-2 bg-transparent transition-all relative group flex flex-col items-center justify-start
                                                ${!dateObj ? 'opacity-30 cursor-default' : 'hover:bg-slate-100/50 dark:hover:bg-slate-700/50 cursor-pointer'}
                                            `}
                                        >
                                            {dateObj && (
                                                <>
                                                    <div className="flex w-full justify-between items-start mb-2">
                                                        <span className={`
                                                            text-sm font-semibold h-7 w-7 flex items-center justify-center rounded-full
                                                            ${isToday ? 'bg-teal-600 text-white' : 'text-slate-700 dark:text-slate-300'}
                                                            ${isWeekend ? 'opacity-50' : ''}
                                                        `}>
                                                            {dateObj.getDate()}
                                                        </span>
                                                    </div>

                                                    {!isWeekend && (
                                                        <div className="mt-2 flex flex-col items-center gap-1 w-full px-2">
                                                            <div className="flex w-full h-2 rounded-full overflow-hidden shadow-sm max-w-[60px]">
                                                                <div className={`w-1/2 h-full ${status.type === 'full' || status.type === 'am' ? 'bg-amber-400' : 'bg-emerald-400'}`}></div>
                                                                <div className="w-px bg-white dark:bg-slate-800 opacity-30"></div>
                                                                <div className={`w-1/2 h-full ${status.type === 'full' || status.type === 'pm' ? 'bg-amber-400' : 'bg-emerald-400'}`}></div>
                                                            </div>
                                                            
                                                            <span className={`
                                                                hidden md:block text-[10px] font-bold mt-1 px-1.5 py-0.5 rounded
                                                                ${status.type === 'free' ? 'text-emerald-600 bg-emerald-50 dark:bg-emerald-900/20' : 'text-amber-700 bg-amber-50 dark:bg-amber-900/20'}
                                                            `}>
                                                                {status.type === 'full' ? 'Indispo' : status.type === 'am' ? 'Aprem Libre' : status.type === 'pm' ? 'Matin Libre' : 'Libre'}
                                                            </span>
                                                        </div>
                                                    )}
                                                </>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </main>

                    {/* Modal Détails */}
                    <Modal 
                        isOpen={isModalOpen} 
                        onClose={() => setIsModalOpen(false)}
                        title={selectedDay?.date ? selectedDay.date.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' }) : ''}
                    >
                        <div className="text-center py-4">
                            {/* INDISPONIBLE */}
                            {selectedDay?.status.type === 'full' && (
                                <>
                                    <div className="bg-amber-100 dark:bg-amber-900/30 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-amber-600 dark:text-amber-500">
                                        <Icons.Briefcase size={32} />
                                    </div>
                                    <h4 className="text-xl font-bold text-slate-800 dark:text-white mb-2">Journée Indisponible</h4>
                                    <p className="text-slate-600 dark:text-slate-400 mb-6">Je suis déjà engagé sur toute la journée.</p>
                                    <div className="bg-slate-50 dark:bg-slate-700/50 p-3 rounded-lg text-sm text-slate-500 dark:text-slate-400">
                                        <Icons.Info size={16} className="inline mr-2 -mt-0.5" />Aucun créneau disponible.
                                    </div>
                                </>
                            )}

                            {/* MATIN PRIS */}
                            {selectedDay?.status.type === 'am' && (
                                <>
                                    <div className="flex justify-center mb-4">
                                        <div className="bg-amber-100 dark:bg-amber-900/30 w-12 h-12 rounded-l-full flex items-center justify-center text-amber-600 opacity-50"><Icons.Sun size={20} /></div>
                                        <div className="bg-emerald-100 dark:bg-emerald-900/30 w-12 h-12 rounded-r-full flex items-center justify-center text-emerald-600 border-l border-white"><Icons.Clock size={24} /></div>
                                    </div>
                                    <h4 className="text-xl font-bold text-slate-800 dark:text-white mb-2">Disponible l'Après-midi</h4>
                                    <p className="text-slate-600 dark:text-slate-400 mb-6">Matin occupé, disponible dès 14h00.</p>
                                    <a href={`mailto:julien@exemple.com?subject=Réservation après-midi du ${selectedDay?.date.toLocaleDateString('fr-FR')}`} className="inline-flex items-center justify-center gap-2 px-6 py-3 text-sm font-bold text-white bg-teal-600 hover:bg-teal-700 rounded-xl transition-all shadow-lg w-full">
                                        <Icons.Mail size={18} />Réserver l'après-midi
                                    </a>
                                </>
                            )}

                             {/* APREM PRIS */}
                            {selectedDay?.status.type === 'pm' && (
                                <>
                                    <div className="flex justify-center mb-4">
                                        <div className="bg-emerald-100 dark:bg-emerald-900/30 w-12 h-12 rounded-l-full flex items-center justify-center text-emerald-600 border-r border-white"><Icons.Clock size={24} /></div>
                                        <div className="bg-amber-100 dark:bg-amber-900/30 w-12 h-12 rounded-r-full flex items-center justify-center text-amber-600 opacity-50"><Icons.Sun size={20} /></div>
                                    </div>
                                    <h4 className="text-xl font-bold text-slate-800 dark:text-white mb-2">Disponible le Matin</h4>
                                    <p className="text-slate-600 dark:text-slate-400 mb-6">Après-midi occupée, libre jusqu'à 13h00.</p>
                                    <a href={`mailto:julien@exemple.com?subject=Réservation matinée du ${selectedDay?.date.toLocaleDateString('fr-FR')}`} className="inline-flex items-center justify-center gap-2 px-6 py-3 text-sm font-bold text-white bg-teal-600 hover:bg-teal-700 rounded-xl transition-all shadow-lg w-full">
                                        <Icons.Mail size={18} />Réserver le matin
                                    </a>
                                </>
                            )}

                            {/* LIBRE */}
                            {selectedDay?.status.type === 'free' && (
                                <>
                                    {selectedDay?.date.getDay() === 0 || selectedDay?.date.getDay() === 6 ? (
                                        <>
                                            <div className="bg-slate-100 dark:bg-slate-700 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-slate-400"><Icons.Calendar size={32} /></div>
                                            <h4 className="text-xl font-bold text-slate-800 dark:text-white mb-2">Week-end</h4>
                                            <p className="text-slate-500 dark:text-slate-400">Repos.</p>
                                        </>
                                    ) : (
                                        <>
                                            <div className="bg-emerald-100 dark:bg-emerald-900/30 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-emerald-600 dark:text-emerald-500 animate-pulse"><Icons.CheckCircle size={32} /></div>
                                            <h4 className="text-xl font-bold text-slate-800 dark:text-white mb-2">Journée Disponible</h4>
                                            <p className="text-slate-600 dark:text-slate-400 mb-6">Ce créneau est entièrement libre.</p>
                                            <a href={`mailto:julien@exemple.com?subject=Réservation journée ${selectedDay?.date.toLocaleDateString('fr-FR')}`} className="inline-flex items-center justify-center gap-2 px-6 py-3 text-sm font-bold text-white bg-teal-600 hover:bg-teal-700 rounded-xl transition-all shadow-lg w-full">
                                                <Icons.Mail size={18} />Réserver cette date
                                            </a>
                                        </>
                                    )}
                                </>
                            )}
                        </div>
                    </Modal>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
